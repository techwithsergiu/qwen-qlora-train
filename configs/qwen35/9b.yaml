# Qwen3.5-text-9B low-VRAM config (start conservative on RTX 3070 8GB)
# Run: qlora-train --config configs/qwen35/9b.yaml
#
# Base model prep (qwen35-toolkit):
#   qwen35-strip  --model Qwen/Qwen3.5-9B --output ./Qwen3.5-text-9B --mode f16
#   qwen35-strip  --model ./Qwen3.5-text-9B --output ./Qwen3.5-text-9B-bnb-4bit --mode bnb
#   qwen35-verify --model ./Qwen3.5-text-9B-bnb-4bit
run_name: qwen35-text-9b-lowvram
model_name: techwithsergiu/Qwen3.5-text-9B-bnb-4bit
chat_template: qwen3

# dataset
dataset_id: TeichAI/claude-sonnet-4.5-high-reasoning-250x
dataset_split: train
messages_field: messages

# VRAM knobs (reduce to 1024 if OOM)
max_seq_length: 1024
max_length: 1024

# LoRA (reduce rank to save VRAM)
lora_r: 16
lora_alpha: 32
lora_dropout: 0.0

# training
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
warmup_ratio: 0.05
max_steps: 500

# memory/perf
load_in_4bit: true
attn_implementation: sdpa
gradient_checkpointing: unsloth

# optimizer (switch to adamw_torch if bitsandbytes issues)
optim: adamw_8bit

# keep last tokens, not the beginning
truncate_side: left

# agent policies
dataset_schema: auto
assistant_roles: ["assistant"]
reasoning_field: reasoning_content
reasoning_keys: ["reasoning", "reasoning_content", "thinking", "reason"]
think_role: "think"
extract_think_tags: true

# think loss control
think_loss: all
think_mode: keep
think_max_tokens: 0
